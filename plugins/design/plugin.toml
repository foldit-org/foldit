id = "design"
kind = "native"
name = "Design"
order = 1

[native]
# Basename form: `PluginManifest::native_binary_name()` decorates this into
# libdesign.so / libdesign.dylib / design.dll.
binary = "design"

# The mutate picker. Each `[[buttons.options]]` entry dispatches `mutate_residue`
# with its own `aa` param. Options are in molex's `AminoAcid::ALL` order; the
# frontend rows them by `color` in first-appearance order, putting hydrophobic
# (orange) above polar (blue).
#
# Icon tokens: `builtin:` a GUI glyph, `game:` foldit-owned art under
# `/game-assets/`, bare path a plugin-relative asset.
[[buttons]]
op = "mutate_residue"
display = "Mutate"
icon = "builtin:replace"
hotkey = "KeyM"
tooltip = "Mutate: change the selected residue's amino-acid identity"
requires_designable = true
selection_spec = { min_residues = 1, max_residues = 1 }

[[buttons.options]]
label = "A"
color = "orange"
icon = "game:residue_icons/ALA.png"
params = { aa = "ALA" }

