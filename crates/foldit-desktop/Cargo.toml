[package]
name = "foldit-desktop"
version = "0.1.0"
edition = "2021"
description = "Desktop binary (wry + winit + wgpu)"
default-run = "foldit"

[[bin]]
name = "foldit"
path = "src/main.rs"

[dependencies]
# Workspace crates
foldit-core = { path = "../foldit-core" }
foldit-gui = { path = "../foldit-gui" }
foldit-runner = { path = "../foldit-runner", default-features = false, features = ["python"] }

# External deps
viso = { git = "https://github.com/petridecus/viso", tag = "v0.3.0", default-features = false }
molex = { version = "0.3.0", features = ["serde", "specta"] }

anyhow = "1.0"

# Async for background ML tasks
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time"] }

# Core
glam = "0.30"
indexmap = "2"
slotmap = "1.0"
smallvec = "1"
winit = "0.30"
pollster = "0.4"
bytemuck = { version = "1.21", features = ["derive"] }
wgpu = "26"

# Direct mmCIF parsing for atom names and residue info
pdbtbx = "0.12"

# Utilities
log = "0.4"
env_logger = "0.11"
env_filter = "0.1"
lazy_static = "1.4"

# HTTP client for downloading from RCSB
reqwest = { version = "0.11", features = ["blocking"] }

# Embedded webview
wry = { version = "0.50", features = ["transparent"] }

# Serialization for IPC and FrontendState
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
base64 = "0.22"

[dev-dependencies]
proptest = "1"
