[workspace]
name = "dummy-plugin-fixture"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

# dummy is the runner's Python round-trip test fixture
[feature.dummy.dependencies]
python = "3.12.*"

[feature.dummy.activation.env]
PYTHONUTF8 = "1"

[feature.dummy.pypi-dependencies]
dummy = { path = ".", editable = true }
foldit-plugin-sdk = "==0.1.6"
molex = "==0.7.4"

[environments]
dummy = { features = ["dummy"] }
