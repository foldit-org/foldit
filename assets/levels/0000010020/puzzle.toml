[puzzle]
title = "Basic Threading"
view_setup = "view_align"
scorefxn = "ref2015_cart"
start_energy = 369.26435
completion_score = 8300.0
min_moves = 3
guide_visible = false
can_align_guide = false
use_dof_tethers = true
align_viz_widget = 0

[puzzle.structure]
path = "structure.pdb"
format = "pdb"
ss = "LLLLLLLLLLHHHHHHHHHHHLLLLLEEEEELLLLEEE"
