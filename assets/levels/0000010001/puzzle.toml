[puzzle]
title = "Intro to Foldit"
start_energy = 390.4476
completion_score = 7700.0

[puzzle.structure]
format = "pdb"
path = "structure.pdb"
ss = "EEE"

[puzzle.camera]
center = [17, 4.9, -22]
eye = [-11, 4.3, 20]
up = [0.066, 1, 0.059]

[[puzzle.filter]]
type = "ClashCount"
plugin = "rosetta"
bonus = -200
max_clashes = 1

[[sequence]]
text = "Welcome to educational mode! In this tutorial, we'll be going through some of the basics of protein biochemistry using Foldit."
point_to = "level"

[[sequence]]
text = "SCIENCE facts will be in GREEN."
color = "science"

[[sequence]]
text = "CLASHES are bad in proteins!"
color = "science"
point_to = "clash"

[[sequence]]
text = """
A CLASH shows where two atoms of the protein are too close together.
When atoms get too close, they push each other away! This CLASH tells us that the atoms of these two SIDECHAINS are too close together, and want to push each other away!"""
color = "science"
point_to = "clash"

[[sequence]]
text = "You can DRAG SIDECHAINS with the mouse. Sidechains can only be in certain positions. Try exploring by giving the sidechain a big pull in every direction to see what it does!"
color = "game"
point_to = "sidechain"

[[sequence]]
text = "Get rid of this CLASH to win the level!"
color = "game"
point_to = "clash"

[[on_event]]
event = "level_complete"
text = "If you want to continue exploring a level after you've beaten it, you can still change things and go onto the next level whenever you're ready."
color = "game"
point_to = "level"
