[[sequence]]
text = "Other times the backbone is too far apart. VOIDS are an indicator that there is empty space that needs to be filled."
color = "game"
point_to = "void"

[[sequence]]
text = "Do you want to know more about the science behind VOIDS?"
point_to = "void"
button = "No thanks"
alt_button = "Sure!"
alt_next = "branch_301"

[[sequence]]
text = "Try getting rid of some of the VOIDS by DRAGGING the backbone together!"
color = "game"
point_to = "backbone"
point_to_index = 1

[[sequence]]
text = "It is not always possible to get rid of all the VOIDS."
color = "yellow"
point_to = "void"

[[sequence]]
text = "Remember to avoid CLASHES! Pull the helices apart a bit, or SHAKE can help."
color = "game"
point_to = "shake"

[[sequence]]
text = "Click here to reset."
color = "game"
point_to = "reset"

[[branch.branch_301]]
text = "VOIDS represent empty space inside a protein! CLASHING shows where protein atoms are too close. VOIDS show where atoms are too far apart!"
color = "science"
point_to = "void"

[[branch.branch_301]]
text = "A VOID in the middle of your protein creates a vacuum, which is unstable! A well-folded protein will be very compact, with all SIDECHAINS packing closely with one another in the protein core!"
color = "science"
point_to = "void"

[[branch.alt_branch_1301]]
text = "Voids represent the empty spaces inside a protein. Even though the atoms don't want to be too close to each other, they also don't want to be too far away. A protein that isn't tightly 'packed' together will be less stable than a protein without extra space."
point_to = "void"

