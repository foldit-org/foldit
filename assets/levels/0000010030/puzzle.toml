[puzzle]
title = "Cut and Move"
view_setup = "view_align"
scorefxn = "ref2015_cart"
start_energy = 67089.895
completion_score = 4000.0
min_moves = 5
max_cutpoints = 0
guide_visible = false
can_align_guide = false
