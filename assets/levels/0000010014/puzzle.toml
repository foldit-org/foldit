[puzzle]
title = "Sheets and Ladders"
view_setup = "view_clashes_hbonds_hydrophobic_stubs"
scorefxn = "ref2015_cart"
start_energy = 83.179386
completion_score = 9500.0
min_moves = 2
guide_visible = false
can_align_guide = false
use_dof_tethers = false

[puzzle.structure]
path = "structure.pdb"
format = "pdb"
ss = "LEEEEEELLLLLEEEEELLLLLLEEEEEL"
