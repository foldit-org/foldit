[[sequence]]
text = "In late 2019, a new highly-infections virus emerged out of Wuhan, China. This virus belongs to the coronavirus family, and is similar to the virus that caused the SARS epidemic in 2002."
color = "science"

[[sequence]]
text = "Coronaviruses display a 'spike' protein on their surface, which binds tightly to a receptor protein found on the surface of human cells. Once the coronavirus spike binds to the human receptor, the virus can infect the human cell and replicate."
color = "science"
point_to = "sidechain"
point_to_index = 53

[[sequence]]
text = "In early 2020, researchers determined the structure of the 2019 coronavirus spike protein and how it binds to human receptors. This early 2020 puzzle asked players to design a protein that binds to this coronavirus spike protein so that it could be used to block the interaction with human cells and halt infection."
color = "science"
point_to = "sidechain"
point_to_index = 53

[[sequence]]
text = "This is the binding site of the coronavirus spike protein. The backbone and most of the sidechains are completely frozen, except for sidechains at the binding site, where the spike protein normally interacts with the human receptor protein."
color = "science"
point_to = "sidechain"
point_to_index = 53

[[sequence]]
text = "Your goal is to design a new protein that binds to these sidechains, blocking interactions with the human receptor."
color = "science"
point_to = "sidechain"
point_to_index = 143

[[sequence]]
text = "In order to bind the coronavirus target, your design will need to make lots of contacts and hydrogen bonds with the spike protein at this binding site. But your design will also need to have lots of secondary structure (helices or sheets) and a large core, so that it folds up correctly!"
color = "science"
point_to = "sidechain"
point_to_index = 143

[[sequence]]
text = "When this puzzle was first launched, the highest score was nearly 17,000! In this challenge level, try to get at least 13,500 points for a good binder design!"
color = "game"
point_to = "sidechain"
point_to_index = 143
