# Convenience aliases - actual work done by cargo xtask
# This file is optional and can be deleted if you prefer using cargo directly

[workspace]
name = "foldit"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]

[tasks]
# These just call cargo xtask. Keep each entry pointed at a real xtask
# subcommand (xtask/src/main.rs `enum Commands`); a stale alias fails at run.
setup = "cargo xtask setup"
setup-plugins = "cargo xtask setup-plugins"
build-host = "cargo xtask build-host"
build-web = "cargo xtask build-web"
package = "cargo xtask package"
