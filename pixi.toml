# Convenience aliases - actual work done by cargo xtask
# This file is optional and can be deleted if you prefer using cargo directly

[workspace]
name = "foldit"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]

[tasks]
# These just call cargo xtask
setup-envs = "cargo xtask setup-envs"
build-rosetta-interactive = "cargo xtask build-rosetta-interactive"
bundle = "cargo xtask bundle"
bundle-cpu = "cargo xtask bundle --cpu-only"
download-models = "cargo xtask download-models"
