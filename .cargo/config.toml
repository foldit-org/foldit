[alias]
xtask = "run --package xtask --"

# Pin Python to the pixi env so cargo builds don't auto-discover a
# system Python with a different ABI (e.g. system 3.13 vs pixi 3.12).
# Mismatch surfaces as undefined Python symbols at link time.
#
# We pin CONDA_PREFIX (the env *root*), not PYO3_PYTHON (a full
# interpreter path), so this stays correct on every OS: pyo3-build-config
# derives the interpreter from CONDA_PREFIX in an OS-aware way
# (<prefix>/python.exe on Windows, <prefix>/bin/python on Unix), and
# foldit-python-host's build.rs already resolves libpython from
# CONDA_PREFIX too. A hardcoded PYO3_PYTHON would bake in one OS's layout.
#
# force is left at its default (false), so `pixi run -e <env> cargo ...`
# — which exports its own CONDA_PREFIX — overrides this; the pin only
# applies to bare `cargo` / `cargo xtask` builds.
[env]
CONDA_PREFIX = { value = "crates/foldit-runner/.pixi/envs/foundry", relative = true }
