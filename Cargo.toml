[workspace]
resolver = "2"
members = [
    "crates/foldit-render",
    "crates/foldit-conv",
    "crates/foldit-ml",
]

[package]
name = "foldit-rs"
version = "0.1.0"
edition = "2021"
description = "A reimagined Foldit decoupled into GUI, render engine, and backends for Rosetta and ML"

[dependencies]
# Workspace crates
foldit-render = { path = "crates/foldit-render" }
foldit-conv = { path = "crates/foldit-conv" }
foldit-ml = { path = "crates/foldit-ml", default-features = false }

# Async for background ML tasks
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time"] }

# Core
glam = "0.30"
winit = "0.30"
pollster = "0.4"
bytemuck = { version = "1.21", features = ["derive"] }
wgpu = "28"

# Direct mmCIF parsing for atom names and residue info
pdbtbx = "0.12"

# Utilities
log = "0.4"
env_logger = "0.11"

# HTTP client for downloading from RCSB
reqwest = { version = "0.11", features = ["blocking"] }

[features]
default = []
# Enable when foldit-ml is available and compiles
# ml = ["foldit-ml"]

[patch."https://github.com/petridecus/foldit-conv"]
foldit-conv = { path = "crates/foldit-conv" }
